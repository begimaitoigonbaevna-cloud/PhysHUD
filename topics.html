<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhysHUD // DATABASE</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #000; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Courier New', monospace; display: flex; height: 100vh; flex-direction: row; }
        
        /* Адаптивность для мобильных устройств */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; }
            nav { width: 100% !important; border-right: none !important; border-bottom: 1px solid #222; height: auto !important; }
            main { padding: 20px !important; }
        }

        .grid { position: fixed; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; }
        
        nav { width: 320px; border-right: 1px solid #222; padding: 30px; background: rgba(5, 5, 5, 0.95); box-sizing: border-box; display: flex; flex-direction: column; }
        
        .back-link { color: var(--neon); text-decoration: none; font-size: 12px; display: block; margin-bottom: 30px; border: 1px solid var(--neon); padding: 10px; text-align: center; transition: 0.3s; }
        .back-link:hover { background: rgba(0, 242, 255, 0.1); box-shadow: 0 0 10px var(--neon); }

        .topic-btn { display: block; width: 100%; padding: 12px; margin-bottom: 10px; background: none; border: 1px solid #333; color: #888; text-align: left; cursor: pointer; font-family: inherit; transition: 0.3s; }
        .topic-btn:hover, .topic-btn.active { border-color: var(--neon); color: var(--neon); background: rgba(0, 242, 255, 0.05); }

        main { flex-grow: 1; padding: 60px; overflow-y: auto; }
        h1 { color: var(--neon); border-bottom: 1px solid var(--neon); padding-bottom: 10px; font-size: 24px; text-transform: uppercase; }
        
        .content-area { line-height: 1.8; color: #ccc; font-size: 16px; max-width: 800px; }
        b { color: var(--neon); }
        ul { padding-left: 20px; }
        
        #charge-sim { width: 100%; height: 200px; background: #050505; border: 1px solid var(--neon); margin-top: 20px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="grid"></div>
    <nav>
        <a href="index.html" class="back-link">⟵ К СИМУЛЯТОРУ</a>
        <h2 style="font-size: 11px; color: #444; letter-spacing: 3px; margin-bottom: 20px;">АРХИВ ДАННЫХ</h2>
        <button class="topic-btn" onclick="show('electrostatics', this)">01. Электростатика</button>
        <button class="topic-btn" onclick="show('electrodynamics', this)">02. Электродинамика</button>
        <button class="topic-btn" onclick="show('induction', this)">03. Эл.магнитная индукция</button>
        <button class="topic-btn" onclick="show('lenz', this)">04. Правило Ленца</button>
    </nav>

    <main>
        <h1 id="title">ИНФОРМАЦИЯ</h1>
        <div id="text" class="content-area">Выберите тему слева для расшифровки данных...</div>
    </main>

    <script>
        const data = {
            'electrostatics': { 
                t: 'Электростатика', 
                c: `Раздел электричества состоит из 2-х частей ("Электростатика" и "Электродинамика"). Изучает свойства электрического тока.<br><br>
                    <b>Электростатика</b> — это раздел электродинамики, который изучает свойства и взаимодействия неподвижных (покоящихся) электрических зарядов.<br><br>
                    Термин «электростатика» происходит от древнегреческого <i>«ἤλεκτρον» (электрон)</i> — «янтарь» и латинского <i>«staticus»</i> — «неподвижный».<br><br>
                    Их электрическое взаимодействие в вакууме описывается <b>законом Кулона</b> (только в вакууме и воздухе, так как схожи в условиях):
                    $$F = k \\cdot \\frac{|q_1| \\cdot |q_2|}{r^2}$$
                    <ul>
                        <li><b>F</b> — сила взаимодействия зарядов, Н</li>
                        <li><b>q</b> — величина электрического заряда в модуле, Кл</li>
                        <li><b>r</b> — расстояние между электрическими зарядами, м</li>
                        <li><b>k</b> — коэффициент пропорциональности ($k \\approx 9 \\cdot 10^9 \\frac{\\text{Н} \\cdot \\text{м}^2}{\\text{Кл}^2}$)</li>
                    </ul>

                    $\\varepsilon$ — относительная диэлектрическая проницаемость (без единиц измерения). Для диэлектрической среды (вода, масло) сила взаимодействия уменьшается, потому что среда «сопротивляется» полю. В знаменатель добавляют $\\varepsilon$:
                    $$F = \\frac{k}{\\varepsilon} \\cdot \\frac{q_1 q_2}{r^2}$$
                    
                    Коэффициент с учетом величин системы СИ определяется через электрическую постоянную $\\varepsilon_0 \\approx 8,85 \\cdot 10^{-12}$ Ф/м:
                    $$k = \\frac{1}{4\\pi\\varepsilon_0}$$
                    
                    Тогда с диэлектриком формула выглядит так:
                    $$F = \\frac{1}{4\\pi\\varepsilon_0\\varepsilon} \\cdot \\frac{q_1 q_2}{r^2}$$
                    
                    Из-за введения диэлектрика уменьшается сила взаимодействия зарядов (F).<br><br>
                    
                    <b>Примеры применения электростатики:</b><br>
                    1. <b>Очистка воздуха (Электрофильтры)</b> — на заводах стоят огромные фильтры. Частицы сажи проходят через сетку под напряжением, получают заряд и притягиваются к пластинам. В небо выходит чистый воздух.<br>
                    2. <b>Электрокардиография (ЭКГ)</b> — при сокращении мышц сердца возникают перераспределения зарядов. Датчики фиксируют эти изменения электростатического потенциала на коже и превращают их в график.<br><br>
                    
                    <div style="color:var(--neon); font-size:12px; letter-spacing:1px;">🧪 ЖИВАЯ МОДЕЛЬ (КЛИКНИ ДЛЯ СМЕНЫ ЗАРЯДА):</div>
                    <canvas id="charge-sim"></canvas>`
            },
            'electrodynamics': { 
                t: 'Электродинамика', 
                c: 'Изучает свойства электрического тока в движении. Ожидание ввода текста...' 
            },
            'induction': { 
                t: 'Электромагнитная индукция', 
                c: 'Ожидание ввода текста...' 
            },
            'lenz': { 
                t: 'Правило Ленца', 
                c: 'Ожидание ввода текста...' 
            }
        };

        let simInterval;

        function show(id, btn) {
            document.getElementById('title').innerText = data[id].t;
            document.getElementById('text').innerHTML = data[id].c;

            // Рендерим формулы заново
            if (window.MathJax) {
                MathJax.typesetPromise();
            }

            // Запускаем симуляцию только для электростатики
            if (id === 'electrostatics') {
                setTimeout(startChargeSim, 100);
            } else if (simInterval) {
                clearInterval(simInterval);
            }

            document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function startChargeSim() {
            const canvas = document.getElementById('charge-sim');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;

            let c1 = { x: canvas.width/2 - 60, y: canvas.height/2, q: 1, col: '#ff0055' };
            let c2 = { x: canvas.width/2 + 60, y: canvas.height/2, q: 1, col: '#ff0055' };
            
            canvas.onclick = () => {
                c2.q *= -1;
                c2.col = c2.q > 0 ? '#ff0055' : '#00f2ff';
            };

            if (simInterval) clearInterval(simInterval);
            simInterval = setInterval(() => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const dx = c2.x - c1.x;
                const dist = Math.abs(dx);
                const force = (c1.q * c2.q) / (dist * dist) * 15000;
                
                if (dist > 40 && dist < canvas.width - 40) {
                    c1.x -= force; c2.x += force;
                } else {
                    c1.x = canvas.width/2 - 60; c2.x = canvas.width/2 + 60;
                }

                [c1, c2].forEach(c => {
                    ctx.fillStyle = c.col;
                    ctx.beginPath(); ctx.arc(c.x, c.y, 12, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "#fff"; ctx.font = "bold 12px Arial"; ctx.fillText(c.q > 0 ? "+" : "-", c.x-3, c.y+4);
                });
            }, 1000/60);
        }
    </script>
</body>
</html>
