<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PhysHUD // ТЕМЫ</title>
    <style>
        :root { --neon: #00f2ff; --bg: #000; }
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Courier New', monospace; display: flex; height: 100vh; 
            overflow: hidden;
        }
        
        /* Сетка фона */
        .grid {
            position: fixed; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1;
        }

        /* ИСПРАВЛЕНО: добавлена скобка после nav */
        nav {
            width: 350px; border-right: 1px solid #222; padding: 30px;
            background: rgba(5, 5, 5, 0.9);
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .back-link { 
            color: var(--neon); 
            text-decoration: none; 
            font-size: 12px; 
            display: block; 
            margin-bottom: 30px; 
            border: 1px dashed var(--neon);
            padding: 10px;
            text-align: center;
            transition: 0.3s;
        }
        .back-link:hover { 
            background: rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 10px var(--neon); 
        }

        .topic-btn {
            display: block; width: 100%; padding: 12px; margin-bottom: 10px;
            background: none; border: 1px solid #333; color: #888;
            text-align: left; cursor: pointer; transition: 0.3s;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
        }
        .topic-btn:hover, .topic-btn.active { 
            border-color: var(--neon); 
            color: var(--neon); 
            background: rgba(0, 242, 255, 0.05); 
        }

        main { flex-grow: 1; padding: 60px; overflow-y: auto; background: rgba(0,0,0,0.2); }
        h1 { 
            color: var(--neon); 
            border-bottom: 1px solid var(--neon); 
            padding-bottom: 10px; 
            font-size: 24px; 
            letter-spacing: 2px;
        }
        .content-area { 
            line-height: 1.6; 
            color: #ccc; 
            font-size: 16px; 
            max-width: 800px; 
            white-space: pre-line; /* Чтобы текст сохранял абзацы */
        }
    </style>
</head>
