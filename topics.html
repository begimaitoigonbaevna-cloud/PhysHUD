<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhysHUD // ТЕМЫ</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #000; }
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Courier New', monospace; display: flex; height: 100vh; 
            flex-direction: row; /* По умолчанию в ряд */
        }
        
        /* Адаптивность для мобилок */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; }
            nav { width: 100% !important; border-right: none !important; border-bottom: 1px solid #222; }
            main { padding: 20px !important; }
        }

        .grid { position: fixed; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; }
        nav { width: 350px; border-right: 1px solid #222; padding: 30px; background: rgba(5, 5, 5, 0.9); box-sizing: border-box; }
        .back-link { color: var(--neon); text-decoration: none; font-size: 12px; display: block; margin-bottom: 30px; border: 1px solid var(--neon); padding: 10px; text-align: center; }
        .topic-btn { display: block; width: 100%; padding: 12px; margin-bottom: 10px; background: none; border: 1px solid #333; color: #888; text-align: left; cursor: pointer; font-family: inherit; }
        .topic-btn.active { border-color: var(--neon); color: var(--neon); }
        main { flex-grow: 1; padding: 60px; overflow-y: auto; }
        h1 { color: var(--neon); border-bottom: 1px solid var(--neon); padding-bottom: 10px; font-size: 24px; }
        .content-area { line-height: 1.8; color: #ccc; font-size: 16px; max-width: 800px; }
    </style>
</head>
<body>
    <div class="grid"></div>
    <nav>
        <a href="index.html" class="back-link">⟵ К СИМУЛЯТОРУ</a>
        <h2 style="font-size: 14px; color: #444; letter-spacing: 3px;">БАЗА ДАННЫХ</h2>
        <button class="topic-btn" onclick="show('electrostatics', this)">01. Электростатика</button>
        <button class="topic-btn" onclick="show('induction', this)">02. Индукция</button>
    </nav>
    <main>
        <h1 id="title">Выберите тему</h1>
        <div id="text" class="content-area">Загрузка...</div>
    </main>

    <script>
        const data = {
            'electrostatics': { 
                t: 'Закон Кулона', 
                c: 'Сила взаимодействия двух точечных зарядов в вакууме: $$F = k \\frac{|q_1| |q_2|}{r^2}$$ где \\(k\\) — коэффициент пропорциональности.' 
            },
            'induction': { 
                t: 'Закон Фарадея', 
                c: 'ЭДС индукции в замкнутом контуре равна скорости изменения магнитного потока: $$\\mathcal{E} = -\\frac{\\Delta\\Phi}{\\Delta t}$$ Знак «минус» объясняется правилом Ленца.' 
            }
        };

        function show(id, btn) {
            document.getElementById('title').innerText = data[id].t;
            document.getElementById('text').innerHTML = data[id].c;
            // Перерисовываем формулы MathJax после смены текста
            MathJax.typeset();
            document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
