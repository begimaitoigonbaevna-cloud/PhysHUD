<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PhysHUD // OSCILLOSCOPE_SYSTEM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #000; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; display: flex; }
        .hud-grid { position: fixed; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; }
        nav { width: 320px; z-index: 10; padding: 40px; background: rgba(0, 0, 0, 0.85); border-right: 1px solid #222; backdrop-filter: blur(10px); }
        .logo { font-size: 12px; letter-spacing: 4px; color: var(--neon); margin-bottom: 40px; font-weight: bold; }
        label { font-size: 10px; color: #666; display: block; margin-bottom: 10px; text-transform: uppercase; }
        input[type=range] { width: 100%; accent-color: var(--neon); margin-bottom: 30px; }
        .data-stream { font-size: 11px; color: var(--neon); line-height: 1.5; margin-top: 50px; }
        #canvas3d { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        /* Новый слой для графика */
        #waveCanvas { position: absolute; bottom: 50px; right: 50px; width: 400px; height: 150px; z-index: 5; border-left: 1px solid var(--neon); }
    </style>
</head>
<body>
    <div class="hud-grid"></div>
    <nav>
        <div class="logo">HAGIWARA // LAB_CORE</div>
        <label>Inductance (L)</label>
        <input type="range" id="L" min="0.5" max="10" step="0.1" value="3">
        <label>Capacitance (C)</label>
        <input type="range" id="C" min="0.5" max="10" step="0.1" value="2">
        <div class="data-stream">> FREQ: <span id="freq-out">0.00</span> Hz<br>> SIGNAL: STABLE<br>> ANALYZING WAVEFORM...</div>
    </nav>

    <div id="canvas3d"></div>
    <canvas id="waveCanvas"></canvas>

    <script>
        // 1. 3D Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas3d').appendChild(renderer.domElement);

        const crystal = new THREE.Mesh(new THREE.IcosahedronGeometry(2, 0), new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true, transparent: true, opacity: 0.4 }));
        scene.add(crystal);
        camera.position.z = 5; camera.position.x = 1;

        // 2. Wave Graph Setup
        const wCanvas = document.getElementById('waveCanvas');
        const wCtx = wCanvas.getContext('2d');
        wCanvas.width = 400; wCanvas.height = 150;

        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            const L = parseFloat(document.getElementById('L').value);
            const C = parseFloat(document.getElementById('C').value);
            const omega = 1 / Math.sqrt(L * C);
            document.getElementById('freq-out').innerText = (omega / (2 * Math.PI)).toFixed(2);

            // 3D Anim
            crystal.rotation.y += 0.01;
            const scale = 1 + Math.sin(time * omega) * 0.15;
            crystal.scale.set(scale, scale, scale);

            // Wave Drawing
            wCtx.clearRect(0, 0, wCanvas.width, wCanvas.height);
            wCtx.strokeStyle = '#00f2ff';
            wCtx.lineWidth = 2;
            wCtx.beginPath();
            for (let i = 0; i < wCanvas.width; i++) {
                const y = 75 + Math.sin((i * 0.05) - (time * omega * 2)) * 40;
                if (i === 0) wCtx.moveTo(i, y); else wCtx.lineTo(i, y);
            }
            wCtx.stroke();

            time += 0.05;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
